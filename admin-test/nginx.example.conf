# ===========================================
# Maydon Cabinet - Nginx Configuration Example
# ===========================================
# 
# This file provides an example nginx configuration for deploying
# the Maydon Cabinet frontend with backend API proxy.
#
# Copy to: /etc/nginx/sites-available/maydon-cabinet
# Link:    ln -s /etc/nginx/sites-available/maydon-cabinet /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx

server {
    listen 80;
    server_name cabinet.maydon.ai;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cabinet.maydon.ai;

    # SSL Configuration (adjust paths for your certificate)
    ssl_certificate /etc/ssl/certs/maydon-cabinet.pem;
    ssl_certificate_key /etc/ssl/private/maydon-cabinet-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Root directory - path to your built frontend files (npm run build -> /dist)
    root /var/www/maydon-cabinet/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;

    # Static file caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API Proxy - Forward /api requests to your backend
    # IMPORTANT: Update the proxy_pass URL to your actual backend server
    location /api {
        proxy_pass http://localhost:7092;  # Your backend API server
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for file uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Increase body size for file uploads
        client_max_body_size 50M;
    }

    # SPA Fallback - All other routes served by Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# ===========================================
# Deployment Checklist
# ===========================================
#
# 1. Build the frontend:
#    npm run build
#
# 2. Copy the /dist folder to your server:
#    scp -r dist/* user@server:/var/www/maydon-cabinet/dist/
#
# 3. Set proper permissions:
#    chown -R www-data:www-data /var/www/maydon-cabinet/dist
#
# 4. Copy this nginx config and update:
#    - server_name to your domain
#    - ssl_certificate paths
#    - proxy_pass to your backend URL
#    - root path if different
#
# 5. Test and reload nginx:
#    nginx -t && systemctl reload nginx
#
# Note about E-IMZO:
# The E-IMZO script loads from 127.0.0.1:64443 on the user's machine.
# This is expected - E-IMZO runs locally on each user's computer.
# No server-side configuration is needed for E-IMZO.
